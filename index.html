<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Din-Biltjek</title>
<meta name="application-name" content="Din-Biltjek">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Din-Biltjek">
<meta name="theme-color" content="#0f1923">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f1923;--bg2:#1a2535;--bg3:#243044;--bg4:#2e3d56;
  --accent:#f5a623;--accent2:#e8941a;
  --blue:#2979ff;--blue2:#1565c0;
  --red:#e53935;--red2:#c62828;
  --green:#43a047;--green2:#2e7d32;
  --text:#e8edf4;--text2:#9aafc7;--text3:#5c7a9e;
  --border:#2e3d56;--shadow:0 4px 20px rgba(0,0,0,0.4);
}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:72px;min-height:100vh;}

/* ── LOGIN ── */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1923 0%,#1a2535 100%);}
.login-box{background:var(--bg2);padding:40px 30px;border-radius:20px;width:90%;max-width:380px;box-shadow:var(--shadow);border:1px solid var(--border);}
.login-logo{text-align:center;font-size:56px;margin-bottom:16px;}
.login-title{text-align:center;font-size:22px;font-weight:bold;color:var(--accent);margin-bottom:8px;}
.login-sub{text-align:center;font-size:13px;color:var(--text2);margin-bottom:28px;}

/* ── HEADER ── */
.header{background:var(--bg2);color:var(--text);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90;}
.header-title{font-size:18px;font-weight:bold;color:var(--accent);}
.icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:7px;cursor:pointer;font-size:14px;}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);display:flex;border-top:1px solid var(--border);z-index:100;}
.nav button{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--text2);font-size:10px;cursor:pointer;transition:color .2s;}
.nav button.active{color:var(--accent);font-weight:bold;}

/* ── CONTENT ── */
.content{padding:14px;}
.page{display:none;} .page.active{display:block;}

/* ── CARDS ── */
.card{background:var(--bg2);padding:14px;border-radius:10px;margin-bottom:10px;border:1px solid var(--border);}
.card-title{font-weight:bold;color:var(--accent);margin-bottom:5px;}
.card-actions{display:flex;gap:8px;margin-top:10px;}
.card-actions button{flex:1;padding:8px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:bold;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.stat-box{background:var(--bg2);padding:14px;border-radius:10px;text-align:center;border:1px solid var(--border);}
.stat-num{font-size:28px;font-weight:bold;color:var(--accent);}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px;}

/* ── BUTTONS ── */
.btn{width:100%;padding:14px;background:var(--accent);color:#0f1923;border:none;border-radius:9px;font-size:15px;font-weight:bold;margin-bottom:10px;cursor:pointer;}
.btn:active{background:var(--accent2);}
.btn-success{background:var(--green);color:white;}
.btn-success:active{background:var(--green2);}
.btn-danger{background:var(--red);color:white;}
.btn-blue{background:var(--blue);color:white;}
.btn-gray{background:var(--bg3);color:var(--text);border:1px solid var(--border);}

/* ── FORM ── */
.form-group{margin-bottom:14px;}
.form-group label{display:block;margin-bottom:6px;font-size:13px;font-weight:bold;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:15px;color:var(--text);outline:none;}
.form-group input:focus,.form-group select,.form-group textarea:focus{border-color:var(--accent);}
.form-group select option{background:var(--bg3);}

/* ── SEARCH ── */
.search-box{background:var(--bg2);padding:12px;border-radius:9px;margin-bottom:12px;display:flex;align-items:center;gap:10px;border:1px solid var(--border);}
.search-box input{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);outline:none;}

/* ── TAGS ── */
.tag{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:bold;margin-right:4px;margin-top:3px;}
.tag-red{background:rgba(229,57,53,.2);color:#ef9a9a;}
.tag-green{background:rgba(67,160,71,.2);color:#a5d6a7;}
.tag-blue{background:rgba(41,121,255,.2);color:#90caf9;}
.tag-orange{background:rgba(245,166,35,.2);color:#ffe082;}

/* ── MODAL ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;}
.modal.active{display:flex;}
.modal-box{background:var(--bg2);width:92%;max-width:520px;max-height:90vh;overflow-y:auto;border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.modal-header{padding:16px;border-bottom:1px solid var(--border);font-weight:bold;font-size:17px;display:flex;justify-content:space-between;align-items:center;color:var(--accent);}
.modal-header button{border:none;background:none;color:var(--text2);font-size:26px;cursor:pointer;line-height:1;}
.modal-body{padding:16px;}
.modal-footer{padding:14px;border-top:1px solid var(--border);display:flex;gap:10px;}

/* ── EQUIPMENT CHECK ── */
.equip-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.equip-row:last-child{border-bottom:none;}
.equip-label{font-size:14px;flex:1;color:var(--text);}
.equip-btns{display:flex;gap:5px;}
.equip-btn{padding:6px 11px;border:1px solid var(--border);background:var(--bg3);border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold;color:var(--text2);}
.equip-btn.ok{background:var(--green);color:white;border-color:var(--green);}
.equip-btn.nej{background:var(--red);color:white;border-color:var(--red);}
.equip-btn.na{background:var(--bg4);color:var(--text2);border-color:var(--bg4);}

/* ── VEHICLE DIAGRAM ── */
.diagram-wrap{position:relative;border-radius:10px;overflow:visible;background:white;cursor:crosshair;}
.diagram-wrap img{width:100%;height:auto;display:block;border-radius:8px;}
.damage-pin{position:absolute;transform:translate(-50%,-100%);pointer-events:none;text-align:center;}
.pin-label{background:var(--bg);color:var(--text);font-size:11px;font-weight:bold;padding:3px 8px;border-radius:5px;white-space:nowrap;margin-bottom:3px;border:1px solid var(--border);}
.pin-dot{width:26px;height:26px;background:var(--red);border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:bold;margin:0 auto;box-shadow:0 2px 8px rgba(0,0,0,.5);}

/* ── DAMAGE LIST ── */
.damage-item{background:rgba(229,57,53,.1);padding:10px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;border:1px solid rgba(229,57,53,.25);}
.damage-title{font-weight:bold;color:#ef9a9a;margin-bottom:3px;font-size:13px;}

/* ── REMINDERS ── */
.reminder-card{background:var(--bg2);padding:13px;border-radius:9px;margin-bottom:10px;border-left:4px solid var(--blue);}
.reminder-card.high{border-left-color:var(--red);}
.reminder-card.medium{border-left-color:var(--accent);}
.reminder-card.done{opacity:.5;}
.reminder-card.waiting{border-left-color:#9c27b0;opacity:.9;}

/* ── REPORT ── */
.report-section{background:var(--bg2);padding:14px;border-radius:10px;margin-bottom:12px;border:1px solid var(--border);}
.report-section h4{color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.report-check-item{padding:10px;border-bottom:1px solid var(--border);cursor:pointer;}
.report-check-item:hover{background:var(--bg3);}
.badge-ok{background:rgba(67,160,71,.2);color:#a5d6a7;padding:2px 8px;border-radius:10px;font-size:11px;}
.badge-nej{background:rgba(229,57,53,.2);color:#ef9a9a;padding:2px 8px;border-radius:10px;font-size:11px;}

/* ── VEHICLE TYPE SELECTOR ── */
.vtype-row{display:flex;gap:8px;margin-bottom:12px;}
.vtype-btn{flex:1;padding:11px;border:2px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:9px;cursor:pointer;font-size:14px;font-weight:bold;text-align:center;}
.vtype-btn.active{border-color:var(--accent);background:rgba(245,166,35,.15);color:var(--accent);}

/* ── WARNINGS ── */
.warning-box{background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.4);border-radius:8px;padding:12px;margin-bottom:10px;color:#ef9a9a;font-size:13px;}
.warning-box.orange{background:rgba(245,166,35,.12);border-color:rgba(245,166,35,.4);color:var(--accent);}

/* ── TOAST ── */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:12px 20px;border-radius:8px;display:none;z-index:2000;border:1px solid var(--border);font-weight:bold;}
.toast.show{display:block;}
.toast.success{background:var(--green);color:white;border-color:var(--green2);}
.toast.error{background:var(--red);color:white;}

/* ── PHOTO GRID ── */
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
.photo-box{position:relative;padding-top:100%;background:var(--bg3);border-radius:7px;overflow:hidden;}
.photo-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-remove{position:absolute;top:2px;right:2px;background:var(--red);color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:16px;line-height:22px;text-align:center;}
input[type="file"]{display:none;}
.file-btn{width:100%;padding:12px;background:var(--bg3);border:2px dashed var(--border);border-radius:8px;cursor:pointer;text-align:center;color:var(--text2);display:block;}

/* ── HISTORY ── */
.history-item{background:var(--bg3);padding:14px;border-radius:9px;margin-bottom:10px;border-left:4px solid var(--blue);}

/* ── TABLE ── */
.table{width:100%;border-collapse:collapse;margin-top:8px;}
.table th,.table td{padding:10px;text-align:left;border-bottom:1px solid var(--border);}
.table th{background:var(--bg3);font-weight:bold;color:var(--text2);}

/* ── SECTION HEADER ── */
.section-hdr{font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin:16px 0 8px;}

@media print{.header,.nav,.btn,.no-print{display:none!important;}body{background:white;color:black;}.page{display:block!important;}.card,.report-section,.stat-box{background:white;color:black;border:1px solid #ccc;}}

/* ── GLOBAL SEARCH ── */
.gs-group-title{font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.gs-item{display:flex;align-items:center;gap:11px;padding:10px 10px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:4px;}
.gs-item:hover,.gs-item:active{background:var(--bg3);}
.gs-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0;}
.gs-main{font-weight:bold;font-size:14px;color:var(--text);}
.gs-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.gs-badge{background:rgba(229,57,53,.2);color:#ef9a9a;font-size:11px;font-weight:bold;padding:2px 7px;border-radius:10px;margin-left:6px;flex-shrink:0;}
.gs-badge.green{background:rgba(67,160,71,.2);color:#a5d6a7;}
.gs-badge.orange{background:rgba(245,166,35,.2);color:#ffe082;}
.gs-badge.blue{background:rgba(41,121,255,.2);color:#90caf9;}
.gs-no-results{color:var(--text3);text-align:center;margin-top:40px;font-size:14px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">🚐</div>
    <div class="login-title">Din-Biltjek</div>
    <div class="login-sub">Log ind for at fortsætte</div>
    <div class="form-group"><label>Adgangskode</label><input type="password" id="loginPass" placeholder="••••" onkeypress="if(event.key==='Enter')doLogin()" autofocus></div>
    <button class="btn" onclick="doLogin()">Log ind</button>
    <div style="margin-top:12px;text-align:center;">
      <span onclick="resetPassword()" style="color:var(--text3);font-size:12px;cursor:pointer;text-decoration:underline;">Glemt kode? Nulstil til 1234</span>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="header-title">🚐 Din-Biltjek</div>
      <div id="syncStatus" title="Firebase sync status" style="font-size:18px;cursor:pointer;" onclick="showFirebaseSettings()">⚫</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="icon-btn" onclick="openGlobalSearch()" title="Søg i hele appen">🔍</button>
      <button class="icon-btn" onclick="showFirebaseSettings()" title="Firebase indstillinger">☁️</button>
      <button class="icon-btn" onclick="showChangePassword()" title="Skift kode">🔑</button>
      <button class="icon-btn" onclick="exportData()" title="Eksporter backup">💾</button>
      <button class="icon-btn" onclick="document.getElementById('importFleet').click()" title="Importer Fleet XLS">🚛</button>
      <button class="icon-btn" onclick="document.getElementById('importStaff').click()" title="Importer medarbejdere XLSX">👥</button>
      <button class="icon-btn" onclick="document.getElementById('importFile').click()" title="Importer backup">📂</button>
      <button class="icon-btn" onclick="doLogout()" title="Log ud">🚪</button>
    </div>
  </div>
  <!-- Firebase settings panel (hidden by default) -->
  <div id="firebasePanel" style="display:none;background:var(--bg2);border-bottom:2px solid var(--accent);padding:14px 16px;">
    <div style="font-weight:bold;color:var(--accent);margin-bottom:10px;">☁️ Firebase Firestore</div>
    <div style="display:grid;gap:8px;">
      <input id="fb_apiKey"     type="text" readonly style="width:100%;padding:8px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px;cursor:default;">
      <input id="fb_authDomain" type="text" readonly style="width:100%;padding:8px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px;cursor:default;">
      <input id="fb_projectId"  type="text" readonly style="width:100%;padding:8px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px;cursor:default;">
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn btn-success" style="margin:0;flex:1;" onclick="saveFirebaseConfig()">🔄 Genforbind</button>
      <button class="btn btn-gray"    style="margin:0;"         onclick="disconnectFirebase()">⏸ Frakobl</button>
      <button class="btn btn-gray"    style="margin:0;"         onclick="document.getElementById('firebasePanel').style.display='none'">×</button>
    </div>
    <div id="firebaseStatus" style="font-size:12px;color:var(--text3);margin-top:8px;"></div>
  </div>
  <input type="file" id="importFile"  accept=".json"      onchange="importData(event)">
  <input type="file" id="importFleet" accept=".xls,.xlsx" onchange="importFleetXLS(event)">
  <input type="file" id="importStaff" accept=".xlsx,.xls" onchange="importStaffXLSX(event)">

  <div class="content">
    <!-- HOME -->
    <div id="homePage" class="page active">
      <div class="stats">
        <div class="stat-box"><div class="stat-num" id="statVehicles">0</div><div class="stat-label">Biler</div></div>
        <div class="stat-box"><div class="stat-num" id="statDrivers">0</div><div class="stat-label">Chauffører</div></div>
        <div class="stat-box"><div class="stat-num" id="statChecks">0</div><div class="stat-label">Biltjek</div></div>
        <div class="stat-box"><div class="stat-num" id="statDamages">0</div><div class="stat-label">Med skader</div></div>
      </div>
      <button class="btn" onclick="openAddVehicle()">➕ Tilføj bil</button>
      <button class="btn" onclick="openModal('driverModal')">➕ Tilføj chauffør</button>
      <button class="btn btn-success" onclick="startNewCheck()">📝 Nyt biltjek</button>
      <div id="recentList"></div>
    </div>

    <!-- VEHICLES -->
    <div id="vehiclesPage" class="page">
      <button class="btn" onclick="openAddVehicle()">➕ Tilføj bil</button>
      <div class="search-box"><span style="font-size:18px;">🔍</span><input type="text" id="vehicleSearch" placeholder="Søg bil..." onkeyup="loadVehicles()"></div>
      <div id="vehicleList"></div>
    </div>

    <!-- DRIVERS -->
    <div id="driversPage" class="page">
      <button class="btn" onclick="openModal('driverModal')">➕ Tilføj chauffør</button>
      <div class="search-box"><span style="font-size:18px;">🔍</span><input type="text" id="driverSearch" placeholder="Søg chauffør..." onkeyup="loadDrivers()"></div>
      <div id="driverList"></div>
    </div>

    <!-- CHECKS -->
    <div id="checksPage" class="page">
      <button class="btn btn-success" onclick="startNewCheck()">📝 Nyt biltjek</button>
      <div class="search-box"><span style="font-size:18px;">🔍</span><input type="text" id="checkSearch" placeholder="Søg bil eller chauffør..." onkeyup="loadChecks()"></div>
      <div id="checkList"></div>
    </div>

    <!-- REPORTS -->
    <div id="reportsPage" class="page">
      <div class="section-hdr">Fejl- og mangelrapport</div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <button class="btn btn-blue no-print" style="margin:0;" onclick="generatePDFReport()">📄 Eksporter TXT</button>
        <button class="btn btn-success no-print" style="margin:0;" onclick="shareReportPDF()">📋 PDF</button>
        <button class="btn no-print" style="margin:0;background:#25D366;color:white;" onclick="shareReportWhatsApp('pdf')">📱 WhatsApp PDF</button>
        <button class="btn no-print" style="margin:0;background:#25D366;color:white;" onclick="shareReportWhatsApp('text')">💬 WhatsApp tekst</button>
        <button class="btn no-print" style="margin:0;background:#0078d4;color:white;" onclick="shareReportEmail()">📧 Email PDF</button>
        <button class="btn btn-gray no-print" style="margin:0;" onclick="window.print()">🖨️ Print</button>
      </div>
      <div class="card no-print">
        <div class="section-hdr" style="margin-top:0;">Filtrer periode</div>
        <div style="display:flex;gap:8px;">
          <input type="date" id="filterFrom" style="flex:1;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;">
          <input type="date" id="filterTo" style="flex:1;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;">
        </div>
        <button class="btn" style="margin-top:10px;margin-bottom:0;padding:10px;" onclick="loadReports()">Opdater</button>
      </div>
      <div id="reportContent"></div>
    </div>

    <!-- REMINDE
